<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260" role="img" aria-label="ととのっている人のイラスト">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff6ff"/>
      <stop offset="100%" stop-color="#ffe5f1"/>
    </linearGradient>
  </defs>
  <rect width="620" height="260" fill="url(#bg2)"/>

  <!-- floor -->
  <rect x="0" y="220" width="620" height="40" fill="#caa472"/>
  <line x1="0" y1="220" x2="620" y2="220" stroke="#7a4f1f" stroke-width="2"/>

  <!-- steam clouds bg -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="120" cy="80" rx="40" ry="14"/>
    <ellipse cx="160" cy="70" rx="30" ry="12"/>
    <ellipse cx="500" cy="80" rx="38" ry="13"/>
    <ellipse cx="465" cy="70" rx="28" ry="11"/>
    <ellipse cx="310" cy="40" rx="60" ry="14"/>
  </g>

  <!-- chair (simple) -->
  <rect x="240" y="170" width="140" height="14" fill="#a87242" stroke="#5b3a1f" stroke-width="2"/>
  <rect x="245" y="184" width="12" height="36" fill="#a87242" stroke="#5b3a1f" stroke-width="2"/>
  <rect x="363" y="184" width="12" height="36" fill="#a87242" stroke="#5b3a1f" stroke-width="2"/>
  <rect x="240" y="100" width="14" height="80" fill="#a87242" stroke="#5b3a1f" stroke-width="2"/>

  <!-- towel on lap -->
  <rect x="260" y="160" width="120" height="14" fill="#fff" stroke="#bbb" stroke-width="2"/>
  <line x1="270" y1="161" x2="270" y2="173" stroke="#bbb"/>
  <line x1="290" y1="161" x2="290" y2="173" stroke="#bbb"/>
  <line x1="310" y1="161" x2="310" y2="173" stroke="#bbb"/>
  <line x1="330" y1="161" x2="330" y2="173" stroke="#bbb"/>
  <line x1="350" y1="161" x2="350" y2="173" stroke="#bbb"/>

  <!-- body -->
  <ellipse cx="320" cy="158" rx="48" ry="22" fill="#ffe0bd" stroke="#9e6b3e" stroke-width="2"/>
  <!-- arms -->
  <path d="M275 160 q-20 -5 -28 -22" stroke="#ffe0bd" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M275 160 q-20 -5 -28 -22" stroke="#9e6b3e" stroke-width="2" fill="none"/>
  <path d="M365 160 q20 -5 28 -22" stroke="#ffe0bd" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M365 160 q20 -5 28 -22" stroke="#9e6b3e" stroke-width="2" fill="none"/>

  <!-- head -->
  <circle cx="320" cy="115" r="32" fill="#ffe0bd" stroke="#9e6b3e" stroke-width="2"/>
  <!-- sauna hat -->
  <path d="M289 92 q31 -38 62 0 z" fill="#fff" stroke="#444" stroke-width="2"/>
  <ellipse cx="320" cy="93" rx="34" ry="6" fill="#fff" stroke="#444" stroke-width="2"/>
  <!-- closed eyes -->
  <path d="M305 118 q5 4 10 0" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M325 118 q5 4 10 0" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M312 132 q8 6 16 0" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <ellipse cx="298" cy="128" rx="5" ry="3" fill="#ffb6c1"/>
  <ellipse cx="342" cy="128" rx="5" ry="3" fill="#ffb6c1"/>
  <!-- sweat drop -->
  <path d="M353 110 q4 8 0 14 q-4 -6 0 -14 z" fill="#7ec8e3" stroke="#3a8eb5" stroke-width="1.2"/>

  <!-- sparkles around -->
  <g font-family="serif" font-weight="bold">
    <text x="100" y="140" font-size="28" fill="#ff1493">★</text>
    <text x="160" y="180" font-size="20" fill="#ffd700">☆</text>
    <text x="490" y="135" font-size="28" fill="#ff1493">☆</text>
    <text x="450" y="190" font-size="20" fill="#ffd700">★</text>
    <text x="220" y="60" font-size="18" fill="#00bfff">✦</text>
    <text x="400" y="55" font-size="18" fill="#00bfff">✦</text>
  </g>

  <!-- "ととのう" speech -->
  <g>
    <ellipse cx="430" cy="100" rx="60" ry="22" fill="#fff" stroke="#ff1493" stroke-width="2"/>
    <polygon points="385,108 370,125 395,115" fill="#fff" stroke="#ff1493" stroke-width="2"/>
    <text x="430" y="107" text-anchor="middle" font-family="'MS PGothic','Hiragino Maru Gothic ProN',sans-serif" font-size="20" font-weight="bold" fill="#ff1493">ととのう♥</text>
  </g>
</svg>
